# config/redlines.yaml
# Plane-0 红线清单（只读挂载 :ro）。本文件与 secureguard/l1_gate.py 的 REDLINES 常量对照，
# 19 条权威清单。用于运维侧审阅与审计；代码以常量为准，YAML 仅作权威文档化与校验来源。
# Agent / 进化流程无权修改本文件（违者命中 R-12）。

version: 1
plane: 0
mutable_by_refiner: false

redlines:
  - id: R-01
    name: 生产数据销毁无备份确认
    detect: type in [destroy_prod_data, rm_production, drop_table, truncate] and not backup_confirmed
  - id: R-02
    name: 受保护分支 force-push / 重写共享历史
    detect: type == force_push and branch in [main, master, protected]
  - id: R-03
    name: 为让它能跑而禁用安全控制
    detect: type == disable_security and reason in [to_make_it_work, to_pass, temporary]
  - id: R-04
    name: 绕过评审直接合入 main
    detect: type == merge_without_review
  - id: R-05
    name: 禁用/删改测试让 CI 变绿
    detect: type in [skip_test, xfail_test, delete_test, disable_assertion] and reason == to_pass_ci
  - id: R-06
    name: 生产自动跑未批准 schema migration
    detect: type == schema_migration and target == production and not human_approved
  - id: R-07
    name: 凭据/密钥硬编码或落 VCS/日志/明文
    detect: type in [hardcode_key, write_credential, commit_secret, log_secret] or contains_plaintext_secret
  - id: R-08
    name: 禁用嵌入式/控制系统安全联锁
    detect: type == disable_safety_interlock
  - id: R-09
    name: 篡改/删除/绕过审计日志
    detect: type in [tamper_audit_log, delete_audit_log, bypass_audit]
  - id: R-10
    name: 数据外泄出已批准边界
    detect: external_send in flags and not approved_boundary
  - id: R-11
    name: 提升权限运行未审查代码
    detect: type == exec_unreviewed_code and privilege == elevated
  - id: R-12
    name: 进化 patch 试图修改 Plane-0
    detect: type == evolve_patch and "Plane-0" in target

handling: 命中即 BLOCK + notify human + 写 audit.redline_hits；不因紧急/演示/口头同意解除。

  # ---- 企业工作台新增 R-13..R-19（措辞建议与 Constitution v2 权威文本最终对齐）----
  - id: R-13
    name: 跨租户/越权访问他人私有知识库或会话
    detect: type in [access_kb, read_session] and visibility==private and owner_id not in [null, caller_id]
  - id: R-14
    name: 敏感数据(PII/凭据/机密)路由或外发出企业边界
    detect: type in [route, send] and data_class in [CONFIDENTIAL, RESTRICTED] and destination==external
  - id: R-15
    name: 篡改/绕过配额或计费记录
    detect: type in [tamper_quota, bypass_billing, forge_usage]
  - id: R-16
    name: 未脱敏 PII 写入日志/思考面板/外部输出
    detect: contains_unmasked_pii and sink in [log, trace_panel, external]
  - id: R-17
    name: 管理员身份执行未经审批的批量用户数据导出
    detect: type==bulk_export and scope==user_data and not approval_ticket
  - id: R-18
    name: 修改/删除他人会话、数据或智能体
    detect: type in [modify, delete] and target_kind in [session, user_data, agent] and owner_id not in [null, caller_id] and caller_role != admin
  - id: R-19
    name: 注入层之外动态提权或覆盖 CONSTITUTION 约束块
    detect: type==override_constitution or (type==privilege_escalation and not authorized)

count: 19
note: R-01..R-12 来自 SecureGuard 原实现，R-13..R-19 为企业工作台扩展，需与 Constitution v2 逐条核对措辞。
