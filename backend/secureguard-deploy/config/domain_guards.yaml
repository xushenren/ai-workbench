# config/domain_guards.yaml
# Plane-0 领域第四层护栏（只读挂载 :ro）。对照 secureguard/l1_gate.py 的 DomainGuard 子类。
version: 1
plane: 0
mutable_by_refiner: false

domains:
  software:           # §2.1 软件/后端
    tier: DOMAIN_GUARD
    rules:
      - 状态变更部署需 幂等性 + 回滚方案 + 已测 down-migration（三缺一 BLOCK）
      - schema migration 默认按不可逆处理，需已测逆向脚本
      - 破坏性 API 变更需显式标注 breaking 并走 R2
  data_ml:            # §2.2 数据/ML
    tier: DOMAIN_GUARD
    rules:
      - 训练数据需 provenance，缺失 BLOCK
      - 检出 PII 未脱敏则禁止原文外流
      - 模型上线评估门 Default-FAIL，无评估结果不得 deploy
      - 禁止静默精度降级
  infrastructure:     # §2.3 基础设施/DevOps
    tier: DOMAIN_GUARD
    rules:
      - 变更需爆炸半径估算，缺失 ASK
      - 禁止绕过 IaC 的手工线上改动
      - 窗口外生产变更 = R2
  scientific:         # §2.4 科学计算
    tier: DOMAIN_GUARD
    rules:
      - 可复现门：种子固定 + 环境锁定 + 单位一致
      - 跨单位运算需量纲校验
      - 收敛声明需条件数/收敛判据
  embedded:           # §2.5 嵌入式/硬件
    tier: DOMAIN_GUARD
    rules:
      - 禁止禁用物理安全联锁
      - 刷写硬件前需 HIL 测试
      - 不可逆物理动作 = R2
  security:           # §2.6 安全敏感（横切）
    tier: SECURITY_CONTROL   # 安全控制属阶梯 L2，高于一般领域护栏
    rules:
      - 安全功能实现前需威胁建模
      - 不自造密码学，必须用审计过的库
      - 密钥仅经保险库，禁止明文落盘/VCS/日志
