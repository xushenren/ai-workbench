# docker-compose.yml — 五层安全门控完整部署。
# 离线/无 GPU 时可只起 gatekeeper + vector_db + orchestrator（model 用 Mock）。
services:
  gatekeeper:
    build: { context: ., dockerfile: Dockerfile }
    command: uvicorn secureguard.api:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    environment:
      - REDLINE_CONFIG=/config/redlines.yaml
      - DOMAIN_GUARDS=/config/domain_guards.yaml
    volumes:
      - ./config:/config:ro          # Plane-0 只读挂载（关键：红线/护栏不可被改写）

  model:                              # 需 GPU；离线环境可注释整段，协调器自动用 Mock
    image: vllm/vllm-openai:latest
    command: --model /models/vertical-model --port 8001 --served-model-name vertical-model
    volumes: ["./models:/models:ro"]
    ports: ["8001:8001"]
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]

  vector_db:
    image: chromadb/chroma:latest
    ports: ["8002:8000"]
    volumes: ["./vector_data:/chroma/chroma"]

  orchestrator:
    build: { context: ., dockerfile: Dockerfile }
    command: uvicorn secureguard.api:app --host 0.0.0.0 --port 9000
    ports: ["9000:9000"]
    environment:
      - MODEL_BASE_URL=http://model:8001/v1
      - VECTOR_DB_HOST=vector_db
    volumes: ["./config:/config:ro"]
    depends_on: [gatekeeper, vector_db]

  audit:                              # 日志聚合（可选）
    image: grafana/loki:latest
    ports: ["3100:3100"]
